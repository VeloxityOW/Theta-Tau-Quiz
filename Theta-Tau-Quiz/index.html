<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Quiz Vault</title>
    <style>
      /* --- Theme + base --- */
      :root{
        --bg0:#140101;
        --bg1:#1b0404;
        --panel:#241010;
        --panel2:#2b1212;
        --border:#5b2a2a;
        --borderSoft:#3e1a1a;
        --text:#ffecec;
        --muted:rgba(255,236,236,.72);
        --muted2:rgba(255,236,236,.55);

        --gold:#d6b25e;
        --red:#b21f2d;

        --ok:#2ecc71;
        --bad:#e74c3c;

        --shadow: 0 12px 40px rgba(0,0,0,.35);
        --shadowSoft: 0 8px 20px rgba(0,0,0,.25);
        --radius: 16px;
      }

      *{ box-sizing:border-box; }
      html,body{ height:100%; }

      body{
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
        margin:0;
        color:var(--text);

        /* Seamless layered background */
        background:
          radial-gradient(1200px 800px at 12% 0%, rgba(214,178,94,.14), transparent 60%),
          radial-gradient(900px 700px at 100% 18%, rgba(178,31,45,.18), transparent 62%),
          radial-gradient(1000px 900px at 50% 110%, rgba(255,236,236,.05), transparent 65%),
          linear-gradient(180deg, var(--bg0), var(--bg1));
        background-attachment: fixed;
      }

      /* optional subtle grain to hide any remaining banding */
      body::before{
        content:"";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: .10;
        background-image:
          repeating-linear-gradient(0deg, rgba(255,255,255,.03), rgba(255,255,255,.03) 1px, transparent 1px, transparent 3px);
        mix-blend-mode: overlay;
      }

      /* --- Layout --- */
      .wrap{
        max-width: 980px;
        margin: 0 auto;
        padding: 28px 18px 54px;
      }

      h1{
        margin: 10px 0 6px;
        font-size: clamp(26px, 4vw, 38px);
        letter-spacing:.2px;
      }

      h2{
        font-size: 18px;
        letter-spacing:.2px;
      }

      .topbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:12px;
        margin: 8px 0 16px;
      }

      /* --- Panels/cards --- */
      .panel{
        background:
          linear-gradient(180deg, rgba(255,236,236,.05), rgba(255,236,236,.02)),
          linear-gradient(180deg, var(--panel), var(--panel2));
        border: 1px solid var(--borderSoft);
        border-radius: var(--radius);
        padding: 16px;
        margin: 14px 0;
        box-shadow: var(--shadowSoft);
        transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      }

      .panel:hover{
        transform: translateY(-1px);
        box-shadow: var(--shadow);
        border-color: rgba(214,178,94,.35);
      }

      .q{
        font-size: 16px;
        font-weight: 800;
        margin: 2px 0 12px;
        line-height: 1.25;
      }

      .hint{
        opacity: 1;
        color: var(--muted);
        font-size: 13px;
        margin-top: 8px;
        line-height: 1.35;
      }

      /* --- Rows --- */
      .row{
        display:flex;
        gap:10px;
        flex-wrap:wrap;
        align-items:center;
      }

      /* --- Inputs & buttons --- */
      input, button{
        border-radius: 14px;
        border: 1px solid var(--borderSoft);
        background: rgba(20,6,6,.55);
        color: var(--text);
        padding: 12px 12px;
        transition: border-color .15s ease, box-shadow .15s ease, transform .06s ease, background .15s ease;
      }

      input{
        outline:none;
      }

      input::placeholder{
        color: rgba(255,236,236,.45);
      }

      input:focus{
        border-color: rgba(214,178,94,.65);
        box-shadow: 0 0 0 4px rgba(214,178,94,.18);
      }

      .ansInput{
        flex:1;
        min-width: 240px;
      }

      button{
        cursor:pointer;
        font-weight: 800;
        letter-spacing:.2px;
        user-select:none;
      }

      button:active{
        transform: translateY(1px);
      }

      /* primary button look */
      button{
        background: linear-gradient(180deg, rgba(214,178,94,.18), rgba(214,178,94,.06));
        border-color: rgba(214,178,94,.35);
      }

      button:hover{
        border-color: rgba(214,178,94,.65);
        box-shadow: 0 0 0 4px rgba(214,178,94,.12);
      }

      /* secondary small button */
      .smallBtn{
        background: rgba(255,236,236,.06);
        border-color: var(--borderSoft);
        font-weight: 700;
      }

      .smallBtn:hover{
        border-color: rgba(255,236,236,.22);
        box-shadow: 0 0 0 4px rgba(255,236,236,.08);
      }

      /* --- Badges/pills --- */
      .pill{
        padding: 7px 11px;
        border: 1px solid rgba(214,178,94,.35);
        border-radius: 999px;
        font-size: 12px;
        color: rgba(255,236,236,.9);
        background: rgba(214,178,94,.08);
      }

      /* --- Status + reveal --- */
      .status{
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
      }

      .reveal{
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px dashed rgba(255,236,236,.22);
        background: rgba(255,236,236,.05);
        font-size: 13px;
        color: rgba(255,236,236,.92);
        display:none;
      }

      /* --- Correct / wrong states (improved) --- */
      .correct{
        border-color: rgba(46,204,113,.95) !important;
        box-shadow: 0 0 0 4px rgba(46,204,113,.18) !important;
        background: rgba(46,204,113,.06) !important;
      }

      .wrong{
        border-color: rgba(231,76,60,.95) !important;
        box-shadow: 0 0 0 4px rgba(231,76,60,.16) !important;
        background: rgba(231,76,60,.06) !important;
      }

      /* --- Gate section polish --- */
      #gate{
        padding: 14px 0;
      }

      #gate .row{
        margin-top: 10px;
      }

      /* --- Mobile tweaks --- */
      @media (max-width: 520px){
        .wrap{ padding: 22px 14px 44px; }
        .panel{ padding: 14px; }
        button, input{ width: 100%; }
        .topbar{ align-items:flex-start; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div id="gate">
        <h1>Quiz Vault</h1>
        <p class="hint">Enter the password to access the study set.</p>
        <div class="row">
          <input id="pw" type="password" placeholder="Password" />
          <button id="unlock">Unlock</button>
        </div>
        <p id="msg" class="hint"></p>
      </div>

      <div id="app" class="hidden">
        <div class="topbar">
          <h2 style="margin:0">Type-to-Answer Cards</h2>
          <div class="pill" id="countPill"></div>
        </div>

        <div class="row" style="margin-bottom:14px;">
          <input id="search" placeholder="Search…" style="flex:1; min-width:240px;" />
          <button id="reload" class="smallBtn">Reload quiz</button>
        </div>

        <div id="list"></div>
        <p class="hint">Tip: Press Enter to check your answer. Use “Reset marks” to clear colors.</p>
      </div>
    </div>

    <script>
      // ✅ CHANGE THIS PASSWORD
      const PASSWORD = "PsiGamma";

      // ✅ ADD/EDIT QUESTIONS HERE
      // Optional: set "mode" to "exact" or "contains" or "multi"
      const questions = [
        // Purpose
        { id: "purpose", q: "Purpose of Theta Tau:", a: "The purpose of Theta Tau is to develop and maintain a high standard of professional interest among its members and to unite them in a strong bond of fraternal fellowship.", mode: "exact" },
        // Motto
        { id: "motto",  q: "Open Motto of Theta Tau:", a: "“Whatsoever thy hand findeth to do, do it with thy might;...” --Ecclesiastes 9:10", mode: "exact" },
        // Alphabets
        { id: "alphabet",q: "Greek Alphabet in Order", a: "Alpha beta gamma delta epsilon zeta eta theta iota kappa lambda mu nu xi omicron pi rho sigma tau upsilon phi chi psi omega", mode: "contains" },
        // Marshal + NME Names
        { id: "Marshal",q: "Marshal Name", a: "Jack Kristof", mode: "contains" },
        { id: "NMEs",q: "NME Names (Full name, Full name, Full name... etc.)", a: "Sonny Diaz, Kyra Rivera, Pari Pandey, Ethan Nguyen, Jack Ballard, Andres Valdes", mode: "contains" },
        // PNM Names
        { id: "1PNM",q: "1st PNM:", a: "Sultan Almotiri", mode: "contains" },
        { id: "2PNM",q: "2nd PNM:", a: "Ishaan Anand", mode: "contains" },
        { id: "3PNM",q: "3rd PNM:", a: "Zane Anthony Cortes", mode: "contains" },
        { id: "4PNM",q: "4th PNM:", a: "Bhanu Rishith Reddy Kesavareddy Gari", mode: "contains" },
        { id: "5PNM",q: "5th PNM:", a: "Helena Eyob Gezahegn", mode: "contains" },
        { id: "6PNM",q: "6th PNM:", a: "Camila Gonzalez", mode: "contains" },
        { id: "7PNM",q: "7th PNM:", a: "Prabal Giridhar Malavalli", mode: "contains" },
        { id: "8PNM",q: "8th PNM:", a: "Kyla Corrine Martinez", mode: "contains" },
        { id: "9PNM",q: "9th PNM:", a: "Taylor Nicole Malone", mode: "contains" },
        { id: "10PNM",q: "10th PNM:", a: "Luke Michael Montoya", mode: "contains" },
        { id: "11PNM",q: "11th PNM:", a: "Kavya Mishra", mode: "contains" },
        { id: "12PNM",q: "12th PNM:", a: "Alp Ethem Ocal", mode: "contains" },
        { id: "13PNM",q: "13th PNM:", a: "Jennifer Lee Perez Castaneda", mode: "contains" },
        { id: "14PNM",q: "14th PNM:", a: "Rachel Quan", mode: "contains" },
        { id: "15PNM",q: "15th PNM:", a: "Lucas Orlando Sanchez", mode: "contains" },
        { id: "16PNM",q: "16th PNM:", a: "Kaushik Chandar Venkatesh", mode: "contains" },
        // Flower
        { id: "Flower",q: "Official Flower of Theta Tau:", a: "Jacqueminot", mode: "contains" },
        // Gem
        { id: "Gem",q: "Official Gem of Theta Tau:", a: "Dark Red Garnet", mode: "contains" },
        // Official Color
        { id: "Colors",q: "Official colors of Theta Tau: (Color, Color)", a: "Dark Red, Gold", mode: "contains" },
        // University Questions
        { id: "Uni",q: "Founding University:", a: "University of Minnesota", mode: "contains" },
        { id: "City",q: "Founding City:", a: "Minneapolis", mode: "contains" },
        { id: "State",q: "Founding State:", a: "Minnesota", mode: "contains" },
        { id: "Date",q: "Founding Date: (Month Day, Year)", a: "October 15th, 1904", mode: "contains" },
        // OG Name
        { id: "OGName",q: "Original name of Theta Tau:", a: "Society of Hammer and Tongs", mode: "exact" },
        // Founder Questions
        { id: "Founders",q: "Original founders: (Name, Name, etc.)", a: "Isaac Baker Hanks, William Murray Lewis, Erich Julius Schrader, Elwin Leroy Vinal", mode: "contains" },
        { id: "DeadOrAlive",q: "Are they Alive? (yes/no)", a: "No", mode: "contains" },
        // Hand + Sleeve
        { id: "CoatOfArms1",q: "What are the 2 objects at the top? (x, y)", a: "hammer, tongs", mode: "contains" },
        { id: "CoatOfArms2",q: "What is clasping these objects?", a: "hands", mode: "contains" },
        { id: "CoatOfArms3",q: "What object is on the left?", a: "tongs", mode: "contains" },
        { id: "CoatOfArms4",q: "What object is on the right?", a: "hammer", mode: "contains" },
        { id: "CoatOfArms5",q: "Whats under the thing clasping these objects?", a: "sleeve", mode: "contains" },
        // Torsade
        { id: "CoatOfArms6",q: "Where is the torsade under?", a: "sleeve", mode: "contains" },
        { id: "CoatOfArms7",q: "How many stripes are in the torsade? (number)", a: "11", mode: "contains" },
        { id: "CoatOfArms8",q: "What colors are alternating in the torsade? (x, y)", a: "Dark red, Gold", mode: "contains" },
        // Gears
        { id: "CoatOfArms9",q: "What objects are on top half of the shield?", a: "gears", mode: "contains" },
        { id: "CoatOfArms10",q: "How many teeth do they have? (number)", a: "26", mode: "contains" },
        { id: "CoatOfArms11",q: "How many spokes do they have? (number)", a: "4", mode: "contains" },
        { id: "CoatOfArms12",q: "Is there a circle in the middle of this object? (yes/no)", a: "yes", mode: "contains" },
        // Bridge
        { id: "CoatOfArms13",q: "What object is on the bottom half of the shield?", a: "bridge", mode: "contains" },
        { id: "CoatOfArms14",q: "How many arches does this object have? (number)", a: "3", mode: "contains" },
        { id: "CoatOfArms15",q: "How many bricks does this object have? (number +/- number)", a: "151 +/- 1", mode: "contains" },
        { id: "CoatOfArms16",q: "What color is this object?", a: "grey | gray | light gray | light grey", mode: "multi" },
        { id: "CoatOfArms17",q: "How many ripples? (number +/- number)", a: "33 +/- 1", mode: "contains" },
        // Shield
        { id: "CoatOfArms18",q: "What color is the top half background of the shield?", a: "Red", mode: "contains" },
        { id: "CoatOfArms19",q: "What color is the bottom half background of the shield?", a: "Gold", mode: "contains" },
        // Ribbon
        { id: "CoatOfArms20",q: "What object is under the shield?", a: "Ribbon", mode: "contains" },
        { id: "CoatOfArms21",q: "What color is this objects background?", a: "Gold", mode: "contains" },
        { id: "CoatOfArms22",q: "How many folds does this object have? (number)", a: "3", mode: "contains" },
        { id: "CoatOfArms23",q: "What letters are written on it?", a: "Theta.Tau.", mode: "Exact" },
        { id: "CoatOfArms24",q: "What color are these letters", a: "black", mode: "contains" },


        // Add more: { id:"x", q:"Question", a:"Answer", mode:"exact" }
      ];

      // ---------- answer checking helpers ----------
      const normalize = (s) => (s || "")
        .toLowerCase()
        .replace(/[“”"']/g, "")
        .replace(/[\u2014\u2013]/g, "-")
        .replace(/[^a-z0-9\s\-\,]/g, " ")
        .replace(/\s+/g, " ")
        .trim();

      function isCorrect(userInput, answer, mode="exact") {
        const u = normalize(userInput);
        const a = normalize(answer);

        if (!u) return false;

        if (mode === "contains") {
          // user must include the key answer phrase(s)
          // works well for longer official definitions
          return a.split(",").every(part => u.includes(part.trim())) || u.includes(a);
        }

        if (mode === "multi") {
          // allow multiple accepted answers separated by |
          const options = answer.split("|").map(x => normalize(x));
          return options.some(opt => u === opt);
        }

        // exact
        return u === a;
      }

      // ---------- UI ----------
      const elGate = document.getElementById("gate");
      const elApp = document.getElementById("app");
      const elPw = document.getElementById("pw");
      const elMsg = document.getElementById("msg");
      const elList = document.getElementById("list");
      const elSearch = document.getElementById("search");
      const elCount = document.getElementById("countPill");

      function filtered() {
        const term = normalize(elSearch.value);
        if (!term) return questions;
        return questions.filter(x =>
          normalize(x.q).includes(term) || normalize(x.a).includes(term)
        );
      }

      function render(items) {
        elList.innerHTML = "";
        elCount.textContent = `${items.length} card(s)`;

        items.forEach((item) => {
          const panel = document.createElement("div");
          panel.className = "panel";

          const q = document.createElement("div");
          q.className = "q";
          q.textContent = item.q;

          const row = document.createElement("div");
          row.className = "row";

          const input = document.createElement("input");
          input.className = "ansInput";
          input.placeholder = "Type your answer…";

          const btn = document.createElement("button");
          btn.textContent = "Check";

          const revealBtn = document.createElement("button");
          revealBtn.textContent = "Show";
          revealBtn.className = "smallBtn";

          const status = document.createElement("div");
          status.className = "status";

          const reveal = document.createElement("div");
          reveal.className = "reveal";
          reveal.textContent = `Answer: ${item.a}`;

          function mark(correct) {
            input.classList.remove("correct", "wrong");
            input.classList.add(correct ? "correct" : "wrong");
            status.textContent = correct ? "✅ Correct" : "❌ Not quite";
          }

          function check() {
            const ok = isCorrect(input.value, item.a, item.mode || "exact");
            mark(ok);
            // keep answer hidden by default; user can click Show if they want
          }

          btn.addEventListener("click", check);
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") check();
          });

          revealBtn.addEventListener("click", () => {
            reveal.style.display = (reveal.style.display === "none" || !reveal.style.display) ? "block" : "none";
            revealBtn.textContent = (reveal.style.display === "block") ? "Hide" : "Show";
          });

          row.appendChild(input);
          row.appendChild(btn);
          row.appendChild(revealBtn);

          panel.appendChild(q);
          panel.appendChild(row);
          panel.appendChild(status);
          panel.appendChild(reveal);

          elList.appendChild(panel);
        });
      }

      document.getElementById("unlock").addEventListener("click", () => {
        if (elPw.value === PASSWORD) {
          elGate.classList.add("hidden");
          elApp.classList.remove("hidden");
          render(questions);
        } else {
          elMsg.textContent = "Wrong password.";
        }
      });

      elPw.addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("unlock").click();
      });

      elSearch.addEventListener("input", () => render(filtered()));

      document.getElementById("reload").addEventListener("click", () => {
        window.location.reload();
      });
    </script>
  </body>
</html>
