<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#140101" />
    <title>ΘΤ Study Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div id="progressBar" class="progress-bar hidden" aria-hidden="true">
      <div id="progressFill" class="progress-fill"></div>
    </div>

    <section id="gate" class="gate-screen" aria-label="Password gate">
      <canvas id="gateCanvas" aria-hidden="true"></canvas>
      <div class="gate-glow" aria-hidden="true"></div>
      <div class="gate-card">
        <div id="gateSymbol" class="gate-symbol">ΘΤ</div>
        <h1 id="gateTitle">Theta Tau</h1>
        <p id="gateSubtitle">Psi Gamma — Study Guide</p>
        <div class="gate-input-wrap">
          <input id="passwordInput" type="password" placeholder="Enter password…" autocomplete="off" aria-label="Password" />
          <button id="unlockButton" type="button">Enter</button>
        </div>
        <p id="gateMessage" class="gate-msg" role="status"></p>
      </div>
    </section>

    <div id="app" class="app-shell hidden">
      <aside class="sidebar" aria-label="Main navigation">
        <button class="brand-button" data-view="dashboard" type="button" aria-label="Dashboard">
          <span class="brand-mark">ΘΤ</span>
          <span>
            <strong id="brandTitle">Study Guide</strong>
            <small id="brandSubtitle">Psi Gamma</small>
          </span>
        </button>

        <nav class="nav-list" id="navList"></nav>

        <div class="sidebar-card">
          <span class="eyebrow">Today</span>
          <strong id="sideProgress">0% mastered</strong>
          <p id="sideEncouragement">Start with flashcards or cram mode.</p>
        </div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="viewEyebrow">Dashboard</p>
            <h1 id="viewTitle">ΘΤ Study Guide</h1>
          </div>
          <div class="top-actions">
            <button id="shuffleButton" class="ghost-btn" type="button">Shuffle</button>
            <button id="resetButton" class="ghost-btn danger" type="button">Reset</button>
          </div>
        </header>

        <section class="stat-grid" aria-label="Study statistics">
          <article class="stat-card"><span id="statTotal">0</span><small>Total Cards</small></article>
          <article class="stat-card"><span id="statCorrect">0</span><small>Correct</small></article>
          <article class="stat-card"><span id="statWrong">0</span><small>Need Review</small></article>
          <article class="stat-card gold"><span id="statMastered">0</span><small>Mastered</small></article>
        </section>

        <section id="view" class="view-container"></section>
      </main>

      <nav class="mobile-nav" id="mobileNav" aria-label="Mobile navigation"></nav>
    </div>

    <div id="toasts" class="toast-container" aria-live="polite"></div>
    <canvas id="confetti" class="confetti-canvas" aria-hidden="true"></canvas>

    <script src="js/config.js"></script>
    <script src="data/questions.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
