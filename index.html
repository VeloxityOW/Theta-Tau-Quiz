<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ΘΤ Study Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div id="progressBar" class="progress-bar hidden">
      <div id="progressFill" class="progress-fill"></div>
    </div>

    <!-- ===== GATE ===== -->
    <div id="gate" class="gate-screen">
      <canvas id="gateCanvas"></canvas>
      <div class="gate-glow"></div>
      <div class="gate-card">
        <div class="gate-symbol">ΘΤ</div>
        <h1>Theta Tau</h1>
        <p>Psi Gamma — Study Guide</p>
        <div class="gate-input-wrap">
          <input
            type="password"
            id="pw"
            placeholder="Enter password…"
            autocomplete="off"
            aria-label="Password"
          />
          <button id="unlock">Enter</button>
        </div>
        <div id="msg" class="gate-msg" role="alert"></div>
      </div>
    </div>

    <!-- ===== APP ===== -->
    <div id="app" class="hidden">
      <div class="wrap">
        <header>
          <div class="header-top">
            <div>
              <h1>ΘΤ Study Guide</h1>
              <p class="subtitle">Psi Gamma — Preparation Material</p>
            </div>
            <div class="header-actions">
              <button
                id="shuffleBtn"
                class="icon-btn"
                title="Shuffle questions"
                aria-label="Shuffle"
              >
                <i class="fas fa-shuffle"></i>
              </button>
              <button
                id="resetBtn"
                class="icon-btn"
                title="Reset all progress"
                aria-label="Reset progress"
              >
                <i class="fas fa-rotate-left"></i>
              </button>
            </div>
          </div>
          <div class="stats-row">
            <div class="stat"><span id="statTotal">0</span> Total</div>
            <div class="stat stat-ok">
              <span id="statCorrect">0</span> Correct
            </div>
            <div class="stat stat-bad"><span id="statWrong">0</span> Wrong</div>
            <div class="stat stat-master">
              <span id="statMastered">0</span> Mastered
            </div>
          </div>
          <div class="filter-row" id="filters" role="tablist"></div>
          <div class="search-row">
            <div class="search-wrap">
              <i class="fas fa-search search-icon"></i>
              <input
                type="text"
                id="search"
                placeholder="Search questions or answers…"
                aria-label="Search"
              />
              <span id="countPill" class="count-pill">0 cards</span>
            </div>
            <div class="toggle-wrap">
              <span>Hide mastered</span>
              <div
                id="hideToggle"
                class="toggle"
                role="switch"
                aria-checked="false"
                tabindex="0"
                aria-label="Hide mastered"
              ></div>
            </div>
          </div>
        </header>
        <main id="list" role="list"></main>
        <div class="keyboard-hints">
          <span><kbd>Enter</kbd> Check answer</span>
          <span><kbd>Tab</kbd> Next field</span>
        </div>
      </div>
    </div>

    <div id="toasts" class="toast-container" aria-live="polite"></div>
    <canvas id="confetti" class="confetti-canvas"></canvas>

    <script src="app.js"></script>
  </body>
</html>
